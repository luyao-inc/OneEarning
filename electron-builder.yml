appId: app.oneearning.desktop
productName: OneEarning
copyright: Copyright © 2026 OneEarning
compression: maximum
artifactName: ${productName}-${version}-${os}-${arch}.${ext}

directories:
  output: release
  buildResources: resources

files:
  - dist
  - dist-electron
  - package.json
  - locales

extraResources:
  # 与 electron/utils/node-resolve.ts 一致：Resources/bin/<platform>-<arch>/node(.exe)
  - from: resources/bin
    to: bin
  - from: build/paperclip
    to: paperclip
  - from: resources/postgres
    to: postgres
  - from: locales/zh-CN
    to: locales/zh-CN
  - from: resources/icons
    to: icons

asar: true
asarUnpack:
  - "**/*.node"

npmRebuild: false

publish:
  - provider: generic
    url: https://example.invalid/oneearning-updates

win:
  icon: resources/icons/icon.png
  verifyUpdateCodeSignature: false
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

mac:
  category: public.app-category.productivity
  icon: resources/icons/icon.png
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.inherit.plist
  # embedded-postgres 体积很大且包含大量原生二进制/库文件，逐文件 codesign 会极慢且容易出现“file modified”重试。
  # 将其排除出签名范围（仍保留在包内），大幅提升构建稳定性与速度。
  signIgnore:
    # 注意：这里是 *正则表达式*（不是 glob），否则会触发 “Invalid regular expression … Nothing to repeat”
    - ".*\\/Resources\\/paperclip\\/node_modules\\/@embedded-postgres\\/.*"
    - ".*\\/Resources\\/app\\.asar\\.unpacked\\/node_modules\\/@embedded-postgres\\/.*"
    - ".*\\/Resources\\/postgres\\/.*"
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]

linux:
  target:
    - target: AppImage
      arch: [x64, arm64]
  category: Utility
