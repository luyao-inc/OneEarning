appId: app.oneearning.desktop
productName: OneEarning
copyright: Copyright © 2026 OneEarning
compression: maximum
artifactName: ${productName}-${version}-${os}-${arch}.${ext}

directories:
  output: release
  buildResources: resources

files:
  - dist
  - dist-electron
  - package.json
  - locales

extraResources:
  - from: servers/clawhub/dist
    to: servers/clawhub
  - from: servers/knowledge/dist
    to: servers/knowledge
  - from: servers/outcomes/dist
    to: servers/outcomes
  - from: build/paperclip
    to: paperclip
  - from: resources/postgres
    to: postgres
  - from: locales/zh-CN
    to: locales/zh-CN
  - from: resources/icons
    to: icons
  # 侧车为 tsc 输出 + 依赖；仅 dist 时运行期无法 resolve hono/sql.js 等
  # 由 scripts/materialize-sidecar-node-modules.mjs 解引用 pnpm junction 后生成
  - from: build/sidecar-node-modules/clawhub/node_modules
    to: servers/clawhub/node_modules
  - from: servers/clawhub/package.json
    to: servers/clawhub/package.json
  - from: build/sidecar-node-modules/knowledge/node_modules
    to: servers/knowledge/node_modules
  - from: servers/knowledge/package.json
    to: servers/knowledge/package.json
  - from: build/sidecar-node-modules/outcomes/node_modules
    to: servers/outcomes/node_modules
  - from: servers/outcomes/package.json
    to: servers/outcomes/package.json

asar: true
asarUnpack:
  - "**/*.node"

npmRebuild: false

publish:
  - provider: generic
    url: https://example.invalid/oneearning-updates

win:
  icon: resources/icons/icon.png
  verifyUpdateCodeSignature: false
  extraResources:
    - from: resources/bin/win32-x64
      to: bin/win32-x64
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

mac:
  category: public.app-category.productivity
  icon: resources/icons/icon.icns
  extraResources:
    - from: resources/bin/darwin-arm64
      to: bin/darwin-arm64
    - from: resources/bin/darwin-x64
      to: bin/darwin-x64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.inherit.plist
  # embedded-postgres 体积很大且包含大量原生二进制/库文件，逐文件 codesign 会极慢且容易出现“file modified”重试。
  # 将其排除出签名范围（仍保留在包内），大幅提升构建稳定性与速度。
  signIgnore:
    # 注意：这里是 *正则表达式*（不是 glob），否则会触发 “Invalid regular expression … Nothing to repeat”
    - ".*\\/Resources\\/paperclip\\/node_modules\\/@embedded-postgres\\/.*"
    - ".*\\/Resources\\/app\\.asar\\.unpacked\\/node_modules\\/@embedded-postgres\\/.*"
    - ".*\\/Resources\\/postgres\\/.*"
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]

linux:
  target:
    - target: AppImage
      arch: [x64, arm64]
  category: Utility
